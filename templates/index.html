<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRODE 2026</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 2rem; border-radius: 1rem; width: 350px; text-align: center; border: 1px solid #334155; }
        h1 { color: #d4af37; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #475569; background: #334155; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #d4af37; border: none; border-radius: 5px; color: #0f172a; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>PRODE 2026</h1>
        <input type="text" id="user" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="login()">Ingresar</button>
    </div>

    <script>
        async function login() {
            const username = document.getElementById('user').value;
            const password = document.getElementById('pass').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });

                if (response.ok) {
                    const user = await response.json();
                    alert("¡Bienvenido " + user.name + "!");
                    // ESTA LÍNEA ES LA QUE TE HACE ENTRAR AL TABLERO
                    window.location.href = "/dashboard";
                } else {
                    alert("Usuario o clave incorrectos");
                }
            } catch (error) {
                alert("Hubo un problema al conectar con el servidor.");
            }
        }
    </script>
</body>
</html>
