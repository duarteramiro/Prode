/* --- TU DISEÑO ORIGINAL (CSS) --- */
:root {
  --gold: #C9A84C; --gold-light: #F0D080; --gold-dark: #8B6914;
  --bg: #0a0f1e; --bg2: #111827; --bg3: #1a2235;
  --surface: #1e2d45; --surface2: #243552;
  --border: rgba(201,168,76,0.2); --border2: rgba(201,168,76,0.4);
  --text: #f0f4ff; --text2: #9aaac4;
  --green: #22c55e; --red: #ef4444;
  --radius: 12px; --radius-sm: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; }
h1,h2,h3,h4 { font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; }

/* Login Screen */
#login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); }
.login-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 3rem 2.5rem; width: 100%; max-width: 420px; text-align: center; }
.login-logo h1 { font-size: 42px; color: var(--gold); margin-bottom: 2rem; }
.form-group { margin-bottom: 1.25rem; text-align: left; }
.form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; }
.form-group input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); padding: 10px 14px; font-size: 15px; outline: none; }
.form-group input:focus { border-color: var(--gold); }
.btn-primary { width: 100%; background: var(--gold); color: #0a0f1e; border: none; border-radius: var(--radius-sm); padding: 12px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 0.5rem; transition: background .2s; }
.btn-primary:hover { background: var(--gold-light); }

/* Main App */
header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 60px; }
.logo { font-family: 'Bebas Neue'; font-size: 22px; color: var(--gold); letter-spacing: 2px; }
.user-info { display: flex; align-items: center; gap: 12px; font-weight: 600; color: var(--gold); }
main { padding: 1.5rem; max-width: 800px; margin: 0 auto; width: 100%; }

/* Match Cards */
.match-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 1rem; }
.match-header { display: flex; justify-content: space-between; margin-bottom: 1rem; font-size: 12px; color: var(--text2); text-transform: uppercase; }
.match-teams { display: flex; align-items: center; gap: 12px; justify-content: space-between; margin-bottom: 1rem; }
.team-name { flex: 1; font-weight: 600; font-size: 16px; text-align: center; }
.pred-input { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 8px; font-size: 18px; font-family: 'Bebas Neue'; text-align: center; width: 60px; outline: none; }
.pred-input:focus { border-color: var(--gold); }
.jersey-group { display: flex; gap: 10px; align-items: center; margin-top: 15px; background: var(--surface); padding: 10px; border-radius: 8px; }
.jersey-group label { font-size: 12px; color: var(--text2); }
