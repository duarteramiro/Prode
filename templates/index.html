<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prode Mundial 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Aquí va el CSS de tu archivo prode-mundial-2026_2.html */
        :root { --gold: #C9A84C; --bg: #0a0f1e; --text: #f0f4ff; --surface: #1e2d45; --border: rgba(201,168,76,0.2); }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .match-card { background: var(--surface); border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 10px; max-width: 500px; }
        .pred-input { width: 50px; text-align: center; background: #1a2235; border: 1px solid var(--gold); color: white; border-radius: 4px; padding: 5px; font-family: 'Bebas Neue'; font-size: 20px; }
        .jersey-input { width: 60px; margin-left: 10px; }
        .btn-save { background: var(--gold); border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="login-area">
        <h2>Ingresar</h2>
        <input type="text" id="user" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="login()">Entrar</button>
    </div>

    <div id="main-content" style="display:none;">
        <h1 id="welcome"></h1>
        <div id="matches-container"></div>
    </div>

    <script>
        // 1. Declaramos las variables globales ARRIBA DE TODO
let currentUser = null; 

async function login() {
    console.log("Iniciando proceso de login...");
    const userField = document.getElementById('user');
    const passField = document.getElementById('pass');

    if (!userField || !passField) {
        console.error("No se encontraron los inputs de usuario o contraseña");
        return;
    }

    const username = userField.value;
    const password = passField.value;

    try {
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password})
        });

        if (!res.ok) {
            const errorData = await res.json();
            alert("Error: " + (errorData.error || "Credenciales incorrectas"));
            return;
        }

        const data = await res.json();
        
        // 2. Aquí asignamos los datos a la variable global que definimos arriba
        currentUser = data; 
        
        console.log("Usuario logueado:", currentUser);

        // 3. Cambiamos de pantalla
        document.getElementById('login-area').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('welcome').innerText = `Hola, ${currentUser.name}`;
        
        // Cargamos los partidos
        loadMatches();

    } catch (err) {
        console.error("Error en la conexión con el servidor:", err);
        alert("No se pudo conectar con el servidor. Revisá que Render diga 'Live'.");
    }
}
        let currentUser = null;

        async function login() {
            const username = document.getElementById('user').value;
            const password = document.getElementById('pass').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            const data = await res.json();
            if (data.id) {
                currentUser = data;
                document.getElementById('login-area').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('welcome').innerText = `Hola, ${data.name}`;
                loadMatches();
            } else { alert(data.error); }
        }

        async function loadMatches() {
            const res = await fetch('/api/matches');
            const matches = await res.json();
            const container = document.getElementById('matches-container');
            container.innerHTML = matches.map(m => `
                <div class="match-card">
                    <p>${m.phase} - ${new Date(m.date).toLocaleString()}</p>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span>${m.home}</span>
                        <input type="number" id="h-${m.id}" class="pred-input">
                        <span>vs</span>
                        <input type="number" id="a-${m.id}" class="pred-input">
                        <span>${m.away}</span>
                    </div>
                    <div style="margin-top:10px;">
                        <label>Dorsal Jugador:</label>
                        <input type="number" id="d-${m.id}" class="pred-input jersey-input" oninput="checkPlayer('${m.id}')">
                        <span id="pname-${m.id}" style="font-size:12px; color:#C9A84C; margin-left:10px;"></span>
                    </div>
                    <button class="btn-save" onclick="savePrediction('${m.id}')">Guardar</button>
                </div>
            `).join('');
        }

        async function checkPlayer(id) {
            const dorsal = document.getElementById(`d-${id}`).value;
            if(!dorsal) return;
            const res = await fetch(`/api/player/${dorsal}`);
            const data = await res.json();
            document.getElementById(`pname-${id}`).innerText = data.name || "No encontrado";
        }

        async function savePrediction(matchId) {
            const payload = {
                user_id: currentUser.id,
                match_id: matchId,
                home_pred: document.getElementById(`h-${matchId}`).value,
                away_pred: document.getElementById(`a-${matchId}`).value,
                dorsal_pred: document.getElementById(`d-${matchId}`).value
            };
            const res = await fetch('/api/predict', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (data.success) alert("Guardado con éxito");
            else alert(data.error);
        }
    </script>
</body>
</html>
