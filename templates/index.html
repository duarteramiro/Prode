<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prode Mundial 2026</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container py-4">
        <h2 class="text-center mb-4">🏆 Prode 2026</h2>
        
        <div class="card shadow-sm mb-3">
            <div class="card-body text-center">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <strong>ARG 🇦🇷</strong>
                    <input type="number" class="form-control w-25 text-center" placeholder="0">
                    <span>vs</span>
                    <input type="number" class="form-control w-25 text-center" placeholder="0">
                    <strong>🇲🇽 MEX</strong>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Jugador del Partido (Dorsal):</label>
                    <input type="number" id="dorsal" class="form-control" placeholder="Ej: 10">
                    <small class="text-muted">Escribe el número de camiseta</small>
                </div>
                
                <button class="btn btn-primary w-100">Guardar Pronóstico</button>
            </div>
        </div>
        <div class="mt-5">
    <h3 class="text-center mb-3">📊 Tabla de Posiciones</h3>
    <div class="table-responsive shadow-sm bg-white rounded">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Participante</th>
                    <th>PTS</th>
                    <th>Exactos</th>
                    <th>Dif. Gol</th>
                </tr>
            </thead>
            <tbody id="tabla-ranking">
                <tr>
                    <td>1</td>
                    <td>Ejemplo Usuario</td>
                    <td><strong>15</strong></td>
                    <td>1</td>
                    <td>+3</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
    </div>
</body>
</html>
